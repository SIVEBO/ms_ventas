spring.application.name=ms_ventas
server.port=8090

spring.datasource.url=jdbc:mariadb://localhost:3306/db_ms_historial_logistico?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format.sql=true
logging.level.org.hibernate.orm.jdbc.bind=TRACE

ms.usuarios.url=http://localhost:8085
ms.sucursales.url=http://localhost:8089